<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>catty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono&family=Inter&family=Playfair+Display&family=Space+Grotesk&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: #f4f4f4;
      color: #111;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 2rem;
    }

    .logo {
      width: min(180px, 40vw);
      height: auto;
      display: block;
      filter: grayscale(100%);
    }

    .brand-name {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: lowercase;
      color: #111;
      transition: font-family 0.15s ease;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.8; }
    }

    .reveal-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .image-wrap {
      position: relative;
      max-width: 520px;
      width: 100%;
    }

    .image-wrap img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 2px;
      filter: blur(24px) grayscale(100%);
      opacity: 0;
      transform: translateY(40px) scale(0.97);
      transition:
        filter 1.4s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1),
        transform 1.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .image-wrap.visible img {
      filter: blur(0) grayscale(100%);
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .image-caption {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666;
      opacity: 0;
      transition: opacity 1s ease 0.6s;
    }

    .image-wrap.visible .image-caption {
      opacity: 1;
    }
  </style>
</head>
<body>

  <section class="hero">
    <img src="catty.png" alt="catty logo" class="logo">
    <h1 class="brand-name" id="brandName">catty</h1>
    <p class="scroll-hint">scroll</p>
  </section>

  <section class="reveal-section">
    <div class="image-wrap" id="imageWrap">
      <img src="image.jpg" alt="catty">
      <p class="image-caption">catty</p>
    </div>
  </section>

  <script>
    const fonts = [
      '"DM Serif Display", serif',
      '"IBM Plex Mono", monospace',
      'Inter, sans-serif',
      '"Playfair Display", serif',
      '"Space Grotesk", sans-serif',
      'Georgia, serif',
      '"Courier New", monospace',
      'system-ui, sans-serif'
    ];

    const brandName = document.getElementById('brandName');
    let fontIndex = 0;

    setInterval(() => {
      fontIndex = (fontIndex + 1) % fonts.length;
      brandName.style.fontFamily = fonts[fontIndex];
    }, 1000);

    const imageWrap = document.getElementById('imageWrap');

    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          imageWrap.classList.add('visible');
        }
      },
      { threshold: 0.25, rootMargin: '0px 0px -10% 0px' }
    );

    observer.observe(imageWrap);
  </script>

</body>
</html>
